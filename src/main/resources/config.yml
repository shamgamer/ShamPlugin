config-version: 1

discord alerts:
  # token: the bot token for the bot that will be sending the alerts.
  token: ""
  # channel: the channel ID for where you want the alerts to be sent.
  channel: ""
  # ping: if empty defaults to @everyone. can be changed to @everyone @here, <@RoleID>, <@UserID> etc... or just normal text prefix to alert.
  ping: ""
  # ignore: a list of substrings; any alert whose formatted message contains one of these will not be sent.
  ignore:
    - "Cannot reply to ClientboundHelloPacket without profile and access token"
    - "Geyser is configured to expect HAProxy protocol for incoming Bedrock connections."
    - "If you do not know what this is, open the Geyser config, and set"
    - "Geyser is configured to use proxy protocol when connecting to the Java server."

links: # for minecraft color codes in messages, use § instead of &.
  map-header: "§6Link To The World Map:" # the header before the url for /map. if empty only send link.
  map-url: "map.changeme.com" # the link that will be sent bellow the header when using /map

uptime:
  flush-interval-seconds: 1
  retention-days: -1 # the amount of days it keeps uptime logs, -1 is infinite.
  merge-gap-ms: 1000

# !!DEPRECATED!! restarter will no longer receive updates and will be removed in version 27.1.0
restarter: # All values are in server ticks, minecraft usually runs at 20 ticks per second.
  start-delay-ticks: 432000   # default 6 hours (432000 ticks)
  interval-ticks: 10          # default 0.5 seconds (10 ticks)
  schedule:
    sunday: [ ]
    monday:
      - "19:00"
    tuesday: [ ]
    wednesday: [ ]
    thursday: [ ]
    friday:
      - "09:00"
    saturday: [ ]

  # Message must be text inside "". sound must be a Bukkit enum name not mojang format.
  # Valid Bukkit sound names can be found in the org.bukkit.Sound enum.
  warnings:
    1h:
      message: "&e⚠ Server restarting in 1 hour!"
      sound: "BLOCK_NOTE_BLOCK_PLING"
    30m:
      message: "&e⚠ Server restarting in 30 minutes!"
      sound: "BLOCK_NOTE_BLOCK_PLING"
    10m:
      message: "&6⚠ Server restarting in 10 minutes!"
      sound: "BLOCK_NOTE_BLOCK_BELL"
    5m:
      message: "&c⚠ Server restarting in 5 minutes!"
      sound: "BLOCK_NOTE_BLOCK_CHIME"
    1m:
      message: "&4⚠ Server restarting in 1 minute!"
      sound: "BLOCK_NOTE_BLOCK_BASS"
    30s:
      message: "&4⚠ Restarting in 30 seconds!"
      sound: "BLOCK_NOTE_BLOCK_BASEDRUM"
    10s:
      message: "&4⚠ Restarting in 10 seconds!"
      sound: "BLOCK_NOTE_BLOCK_BASEDRUM"
    5s:
      message: "&4⚠ Restarting in 5..."
      sound: "BLOCK_NOTE_BLOCK_HAT"
    4s:
      message: "&4⚠ Restarting in 4..."
      sound: "BLOCK_NOTE_BLOCK_HAT"
    3s:
      message: "&4⚠ Restarting in 3..."
      sound: "BLOCK_NOTE_BLOCK_HAT"
    2s:
      message: "&4⚠ Restarting in 2..."
      sound: "BLOCK_NOTE_BLOCK_HAT"
    1s:
      message: "&4⚠ Restarting in 1..."
      sound: "BLOCK_NOTE_BLOCK_HAT"

  restart:
    command: "restart"
    message: "&c⚠ Server is restarting now!"
    sound: "BLOCK_ANVIL_LAND"

update-checker:
  enabled: true
  project-id: "w6F3AvdX" # the modrinth id for update checks, default is "w6F3AvdX"
  loaders: ["purpur", "paper"]
  include-prerelease: false # false will ignore beta and alpha versions
  interval-hours: 12
  notify-console: true # Notify in console after server start + at interval hours
  notify-ops: true # Notify in player's chat at interval hours
  notify-ops-on-login: true # Notify in player's chat at login for ops
  notify-ops-on-login-delay-ticks: 75 # Delay in tick after an op joins where they will be notified.

axrewards:
  login-reminder:
    enabled: true # toggle for login rewards check
    delay-ticks: 300 # delay in ticks after a player joins before the message is sent
    placeholder: "%axrewards_collectable%" # The placeholder it will check if it's larger than 1
    command: "/daily" # The command that will be activated when clicking, use <cmd> to put it in the message.
    # Text placeholders for messages <count> displays how many unclaimed the player has, <cmd> is command set above, <stk> is the streak from login-streaks.
    # !! for <stk> to work login-streaks: enabled must be true !!
    message-single: "<gold>You have <yellow><count></yellow> unclaimed reward! Use <green><cmd></green> to claim it. (Streak: <stk> days)" # message that is sent if placeholder returns 1
    message-multiple: "<gold>You have <yellow><count></yellow> unclaimed rewards! Use <green><cmd></green> to claim them. (Streak: <stk> days)" # message that is sent if placeholder returns a number larger than 1
    sound:
      enabled: true # toggle for sound the message
      name: "entity.experience_orb.pickup"
      volume: 0.75
      pitch: 1.0
  login-streaks:
    # !! use /sham streak reward %player% <list> command in axrewards or outside to use !!
    enabled: true # toggles login streaks
    pause: false # prevents streaks from being lost when true, useful after long server maintenances
    claim_period: "24h" # how much time must pass before grace is lose (example 24h: 24h for daily then another 24h to claim before grace used)
    grace_per_cycle: 2 # number of missed claim windows players can skip without losing their streak
    grace_reset_period: "7d" # how often grace usage resets, counted from the day/time anchor below
    grace_reset_day: 1 # anchor day for the grace reset cycle, 0 Sunday 6 Saturday
    grace_reset_time: 0:30 # anchor time of day (UTC) for the grace reset cycle
    leaderboard_update_interval_minutes: 10 # how often the /streaktop and /higheststreaktop update their info
    leaderboard_display_length: 10 # value from 1 to 100
    rewards:
      daily: # example of <list> placeholders
        streak: true
        bonuses: # what commands will be executed if the player has the amount of streaks when /sham streak reward is used
          3:
            commands: # executed server side %player% from axrewards placeholder
              - "eco give %player% 5"
          7:
            commands:
              - "eco give %player% 10"
          14:
            commands:
              - "eco give %player% 15"
          28:
            commands:
              - "eco give %player% 25"
      weekly:
        streak: false
        bonuses:
          14:
            commands:
              - "eco give %player% 50"
          28:
            commands:
              - "eco give %player% 100"
          84:
            commands:
              - "eco give %player% 150"

help:
  # How many chat lines to show per page
  lines-per-page: 3
  # Maximum visible characters allowed per chat line when packing commands.
  max-line-chars: 45
  # Maximum number of commands to show on a single chat line
  max-per-line: 5
  # Force a second item onto a line even if it exceeds max-line-chars
  force-second-item: true
  # Show navigation and usage hint for /help
  show-help-hint: true
  # Show hint only on page 1, requires show-help-hint to be true
  hint-page1-only: true
  # The text that will be displayed for hint in /help, requires show-help-hint to be true
  help-hint: "§7Click a command to place it in chat. Click the arrows to navigate pages."

  # Description is hovered text, command is displayed and when clicked it places it in the chat line without sending.
  entries:
    - command: "/rules"
      description: "Show the server rules"
    - command: "/map"
      description: "Open the world map"
    - command: "/discord"
      description: "Join our Discord server"
    - command: "/tpa"
      description: "Request to teleport to another player"
    - command: "/tpahere"
      description: "Request another player to teleport to you"
    - command: "/tpyes"
      description: "Accept a tpa request"
    - command: "/tpno"
      description: "Decline a tpa request"
    - command: "/home"
      description: "Teleport to your home"
    - command: "/sethome"
      description: "Set your home location"
    - command: "/delhome"
      description: "Delete a home"
    - command: "/graves list"
      description: "List your graves"
    - command: "/rewards"
      description: "Opens the money login rewards menu"
    - command: "/order"
      description: "Opens the orders menu"
    - command: "/ah"
      description: "Opens the auction house menu"
    - command: "/hat"
      description: "Wear the item in your hand as a hat (requires cacti rank)"
    - command: "/afk"
      description: "Toggle AFK status"
    - command: "/msg <player>"
      description: "Send a private message"
    - command: "/r"
      description: "Reply to last private message"
    - command: "/dynmap hide"
      description: "Hide from dynmap"
    - command: "/dynmap show"
      description: "Show on dynmap"
    - command: "/sit"
      description: "Sit down"
    - command: "/crawl"
      description: "Crawl on the ground"
    - command: "/lay"
      description: "Lay down"
    - command: "/spin"
      description: "Spin around (requires cacti rank)"
    - command: "/bellyflop"
      description: "Belly flop!"
    - command: "/sham uptime"
      description: "Show server uptime statistics"
    - command: "/shop create <price>"
      description: "Makes the container you are looking at into a shop of your held item with the stated price, right click to modify"
    - command: "/shop discord"
      description: "Modify discord bot alerts for shop events"
    - command: "/shop limit"
      description: "Set how many items each player can buy for a spesific ammount of time"
    - command: "/bal"
      description: "Show how much money you have"
    - command: "baltop"
      description: "Show the money leaderboard"
    - command: "/shop discount"
      description: "create, delete, set or unset a discount code for a shop"
    - command: "/shop list"
      description: "Shows a list of your shops"